behaviors:
  BankGuardAgent:
    trainer_type: ppo
    hyperparameters:
      batch_size: 1024              # larger batch for more stable gradients
      buffer_size: 16384
      learning_rate: 5.0e-4         # higher LR with linear schedule
      beta: 3.0e-2                  # 3x entropy bonus to fight mode collapse
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
      beta_schedule: constant       # keep entropy bonus stable (not annealed)
      epsilon_schedule: linear
    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 2
    reward_signals:
      extrinsic:
        gamma: 0.995
        strength: 1.0
    max_steps: 12000000
    time_horizon: 128
    summary_freq: 5000              # 2x more frequent reports
    keep_checkpoints: 30
    checkpoint_interval: 1000000    # save every 1M steps; ONNX export patched to legacy exporter via launcher

env_settings:
  num_envs: 1
  num_areas: 8
engine_settings:
  time_scale: 20

environment_parameters:
  # Slots are now ordered: basement_0, basement_1, ground_0..3.
  # S1 starts with 1 basement deposit (right next to spawn = trivial).
  # S2 adds basement_1. S2b adds 1 ground floor. S3 all 6.
  num_deposits:
    curriculum:
      - name: S1_Nav_1Deposit
        completion_criteria: { measure: reward, behavior: BankGuardAgent, threshold: 0.8, min_lesson_length: 50, signal_smoothing: true }
        value: 1.0
      - name: S2_Nav_2Basement
        completion_criteria: { measure: reward, behavior: BankGuardAgent, threshold: 1.0, min_lesson_length: 80, signal_smoothing: true }
        value: 2.0
      - name: S2b_Nav_3Mixed
        completion_criteria: { measure: reward, behavior: BankGuardAgent, threshold: 1.0, min_lesson_length: 120, signal_smoothing: true }
        value: 3.0
      - name: S3_Nav_6Deposits
        completion_criteria: { measure: reward, behavior: BankGuardAgent, threshold: 1.0, min_lesson_length: 150, signal_smoothing: true }
        value: 6.0
      - name: S4_AddAlarms
        completion_criteria: { measure: reward, behavior: BankGuardAgent, threshold: 1.0, min_lesson_length: 150, signal_smoothing: true }
        value: 6.0
      - name: S5_AddAudio
        completion_criteria: { measure: reward, behavior: BankGuardAgent, threshold: 0.8, min_lesson_length: 200, signal_smoothing: true }
        value: 6.0
      - name: S6_AddThief
        value: 6.0

