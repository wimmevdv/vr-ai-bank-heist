behaviors:
  BankGuardAgent:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048
      buffer_size: 20480
      learning_rate: 3.0e-4
      beta: 1.5e-1
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
      beta_schedule: linear
      epsilon_schedule: linear
    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 2
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
      curiosity:
        gamma: 0.99
        strength: 0.02
        network_settings:
          hidden_units: 128
          num_layers: 2
        learning_rate: 3.0e-4
    max_steps: 15000000
    time_horizon: 256
    summary_freq: 5000
    keep_checkpoints: 30
    checkpoint_interval: 1000000

env_settings:
  num_envs: 1
  num_areas: 8
engine_settings:
  time_scale: 20

# v4 single-stage: collapsed S1+S2. After 3M S1-only training, the policy has
# learned proximity-driven chase. Switching to full task (6 deposits + alarms +
# audio + thief) gives the agent more chase signal per episode — the thief stays
# active throughout instead of going idle after stealing one deposit.
environment_parameters:
  num_deposits: 6.0
  shaping: 1.0
  w_progress: 0.03
  alarms_on: 1.0
  audio_on: 1.0
  thief_on: 1.0
