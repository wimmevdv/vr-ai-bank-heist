behaviors:
  BankGuardAgent:
    trainer_type: ppo
    hyperparameters:
      batch_size: 512
      buffer_size: 16384
      learning_rate: 3.0e-4
      beta: 1.0e-2
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
      beta_schedule: linear
      epsilon_schedule: linear
    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 2
    reward_signals:
      extrinsic:
        gamma: 0.995
        strength: 1.0
    max_steps: 20000000
    time_horizon: 128
    summary_freq: 10000
    keep_checkpoints: 20
    checkpoint_interval: 100000000   # disabled: triggers ONNX export which crashes when onnxscript is missing. Accept risk of progress loss on crash; .pt only saved at max_steps end.

env_settings:
  num_envs: 1
  num_areas: 8                # duplicate env root 8x in the scene for parallel data
engine_settings:
  time_scale: 20

environment_parameters:
  # ---------- Stage progression ----------
  # S1 (1 dep) → S2 (3 dep) → S2b (4 dep, NEW) → S3 (6 dep) → S4 (alarms) → S5 (audio) → S6 (thief)
  num_deposits:
    curriculum:
      - name: S1_Nav_1Deposit
        completion_criteria: { measure: reward, behavior: BankGuardAgent, threshold: 0.5, min_lesson_length: 100, signal_smoothing: true }
        value: 1.0
      - name: S2_Nav_3Deposits
        completion_criteria: { measure: reward, behavior: BankGuardAgent, threshold: 0.8, min_lesson_length: 100, signal_smoothing: true }
        value: 3.0
      - name: S2b_Nav_4Deposits
        completion_criteria: { measure: reward, behavior: BankGuardAgent, threshold: 0.6, min_lesson_length: 150, signal_smoothing: true }
        value: 4.0
      - name: S3_Nav_6Deposits
        completion_criteria: { measure: reward, behavior: BankGuardAgent, threshold: -1.0, min_lesson_length: 150, signal_smoothing: true }
        value: 6.0
      - name: S4_AddAlarms
        completion_criteria: { measure: reward, behavior: BankGuardAgent, threshold: -0.5, min_lesson_length: 150, signal_smoothing: true }
        value: 6.0
      - name: S5_AddAudio
        completion_criteria: { measure: reward, behavior: BankGuardAgent, threshold: 0.0, min_lesson_length: 200, signal_smoothing: true }
        value: 6.0
      - name: S6_AddThief
        value: 6.0

  shaping:
